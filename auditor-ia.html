<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS — Auditor IA (Simulador Cognitivo)</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060A14; --surf: #0C1426; --surf2: #111D35; --border: rgba(0,212,255,0.15);
  --cyan: #00D4FF; --warn: #FFB800; --danger: #FF3B3B; --success: #00FF88; --purple: #9B5CF6;
  --text: #E8F4FF; --muted: #7A9AB8;
  --ff: 'Exo 2', sans-serif; --fm: 'JetBrains Mono', monospace; --fd: 'Rajdhani', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--ff); padding: 20px; }
.header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.title { font-family: var(--fd); font-size: 1.8rem; font-weight: 700; color: var(--cyan); letter-spacing: 2px; }
.grid { display: grid; grid-template-columns: 250px 1fr; gap: 20px; align-items: start; }
.panel { background: var(--surf); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.btn { width: 100%; padding: 12px; background: var(--surf2); border: 1px solid var(--border); color: var(--text); font-family: var(--fm); font-size: 0.8rem; cursor: pointer; text-align: left; margin-bottom: 10px; border-radius: 4px; transition: 0.2s; }
.btn:hover, .btn.active { background: rgba(0,212,255,0.1); border-color: var(--cyan); color: var(--cyan); }
.btn-run { background: var(--purple); color: white; text-align: center; font-weight: bold; border: none; margin-top: 20px; }
.btn-run:hover { background: #8B5CF6; color: white; }
.console { background: #000; border: 1px solid #333; padding: 20px; border-radius: 8px; font-family: var(--fm); font-size: 0.85rem; height: 65vh; overflow-y: auto; line-height: 1.6; }
.log-user { color: var(--warn); margin-bottom: 10px; }
.log-ai { color: var(--cyan); margin-bottom: 20px; padding-left: 10px; border-left: 2px solid var(--cyan); }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--cyan); border-right-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="title">JARVIS // SIMULADOR DE AUDITORIA IA</div>
  <div style="font-family: var(--fm); font-size: 0.8rem; color: var(--muted);" id="statusConn">Conectando ao banco de dados...</div>
</div>

<div class="grid">
  <div class="panel">
    <h3 style="font-family: var(--fd); margin-bottom: 15px; color: var(--muted);">PERSONA / MÓDULO</h3>
    <button class="btn active" id="btnAdmin" onclick="setPersona('admin', this)">👔 Gestor (jarvis.html)</button>
    <button class="btn" id="btnMec" onclick="setPersona('mecanico', this)">🔧 Mecânico (equipe.html)</button>
    <button class="btn" id="btnCli" onclick="setPersona('cliente', this)">📱 Cliente (cliente.html)</button>
    <button class="btn" id="btnSys" onclick="setPersona('superadmin', this)">🛡️ Superadmin (SaaS)</button>
    
    <button class="btn btn-run" onclick="runAudit()">▶ EXECUTAR AUDITORIA</button>
  </div>

  <div class="console" id="consoleOutput">
    <div style="color: var(--muted);">> Inicializando console de testes cognitivos...</div>
    <div style="color: var(--muted);">> Aguardando seleção de persona e execução.</div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
const db = window.initFirebase();
let DB_CACHE = { os: [], clientes: [], estoque: [], financeiro: [] };
let currentPersona = 'admin';
const tid = sessionStorage.getItem('j_tid');
const geminiKey = sessionStorage.getItem('j_gemini');

if(!tid) {
    document.getElementById('consoleOutput').innerHTML = '<div style="color: var(--danger)">ERRO: Tenant ID não encontrado. Faça login no sistema primeiro.</div>';
}

// PRELOAD DATABASE
db.collection('ordens_servico').where('tenantId', '==', tid).get().then(snap => DB_CACHE.os = snap.docs.map(d => d.data()));
db.collection('clientes').where('tenantId', '==', tid).get().then(snap => DB_CACHE.clientes = snap.docs.map(d => d.data()));
db.collection('estoqueItems').where('tenantId', '==', tid).get().then(snap => DB_CACHE.estoque = snap.docs.map(d => d.data()));
db.collection('financeiro').where('tenantId', '==', tid).get().then(snap => {
    DB_CACHE.financeiro = snap.docs.map(d => d.data());
    document.getElementById('statusConn').innerText = `Banco carregado: ${DB_CACHE.os.length} OS | ${DB_CACHE.estoque.length} Peças`;
    document.getElementById('statusConn').style.color = 'var(--success)';
});

function setPersona(persona, el) {
  currentPersona = persona;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function log(text, isAi = false) {
  const c = document.getElementById('consoleOutput');
  const div = document.createElement('div');
  div.className = isAi ? 'log-ai' : 'log-user';
  if(isAi) div.innerHTML = `<strong>[JARVIS ANALYSIS]</strong><br>${text}`;
  else div.innerHTML = `> ${text}`;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

async function runAudit() {
  if(!geminiKey) { log('ERRO: Chave Gemini não encontrada na sessão.', false); return; }

  const osPendentes = DB_CACHE.os.filter(o => o.status !== 'Entregue' && o.status !== 'Cancelado').length;
  const lucro = DB_CACHE.financeiro.filter(f=>f.status==='Pago').reduce((acc, f) => acc + (f.tipo === 'Entrada' ? f.valor : -f.valor), 0);

  let prompt = "";
  
  if (currentPersona === 'admin') {
      log("Simulando visão do Gestor no jarvis.html...");
      prompt = `Você é um auditor de negócios automotivos. Aqui estão os dados da oficina atual:
      - Ordens de Serviço em aberto: ${osPendentes}
      - Total de OS no histórico: ${DB_CACHE.os.length}
      - Lucro Caixa Atual: R$ ${lucro.toFixed(2)}
      - Peças em estoque: ${DB_CACHE.estoque.length}
      
      Atue como o Gestor. Encontre furos operacionais. O que está errado com esses números? Há muitas OS abertas comparado ao histórico? O lucro faz sentido? Dê 3 diretrizes urgentes para melhorar a lucratividade e o controle da oficina, sendo extremamente crítico.`;
  } 
  else if (currentPersona === 'mecanico') {
      log("Simulando visão do Mecânico no equipe.html...");
      prompt = `Você é um mecânico testando o painel de produção (equipe.html). 
      Dados: Você tem ${osPendentes} carros no pátio agora.
      Com base na experiência de uma oficina real, quais as maiores dificuldades que um mecânico enfrenta ao preencher diagnósticos digitais e checklist? Como o sistema poderia automatizar a entrada de dados (como torques e peças) para que o mecânico perca menos tempo digitando e mais tempo consertando? Dê 3 ideias arquiteturais.`;
  }
  else if (currentPersona === 'cliente') {
      log("Simulando visão do Cliente no cliente.html...");
      prompt = `Você é um cliente exigente testando o Portal B2C (cliente.html) da oficina.
      Você acabou de receber um link de uma OS. O que te faria desconfiar do orçamento? Quais informações exatas você exige ver no Laudo em PDF e no histórico para aprovar um serviço caro sem questionar o mecânico? Critique a transparência padrão de oficinas e sugira o que o sistema JARVIS deve mostrar para ganhar sua confiança absoluta.`;
  }
  else {
      log("Simulando visão do Superadmin (Gestor do SaaS)...");
      prompt = `Você é o dono do software JARVIS ERP (Superadmin). Você tem dezenas de oficinas usando seu sistema.
      Avalie o banco de dados atual (NoSQL Firebase Firestore). O risco de baixar todas as OS para filtrar no front-end é um vazamento de dados grave (LGPD). Explique tecnicamente como isso deve ser corrigido com Queries de Backend e Rules do Firestore. Seja direto e escreva a regra de segurança do firebase que bloqueia leitura cruzada de clientes.`;
  }

  const spinnerId = 'spin-' + Date.now();
  log(`<span class="spinner" id="${spinnerId}"></span> Processando análise profunda...`, true);

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{ role: 'user', parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: "Responda em formato Markdown, português do Brasil, seja altamente técnico, não seja bajulador." }] }
      })
    });
    
    const data = await res.json();
    document.getElementById(spinnerId).remove();
    
    const resp = data.candidates[0].content.parts[0].text;
    log(resp.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--text)">$1</strong>'), true);

  } catch(e) {
    document.getElementById(spinnerId).remove();
    log("Falha na execução da IA: " + e.message, true);
  }
}
</script>
</body>
</html>
