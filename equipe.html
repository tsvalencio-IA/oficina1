<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S — Painel da Equipe</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060A14;--surf:#0C1426;--surf2:#111D35;--surf3:#162040;
  --cyan:#00D4FF;--danger:#FF3B3B;--warn:#FFB800;--success:#00FF88;
  --text:#E8F4FF;--muted:#4A6B8A;--muted2:#7A9AB8;
  --border:rgba(0,212,255,0.1);--border2:rgba(0,212,255,0.2);
  --ff:'Exo 2',sans-serif;--fm:'JetBrains Mono',monospace;--fd:'Rajdhani',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--ff);color:var(--text);}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surf);}
::-webkit-scrollbar-thumb{background:var(--surf3);}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.logo{font-family:var(--fd);font-size:1.2rem;font-weight:700;letter-spacing:4px;color:var(--cyan);}
.topbar-info{font-family:var(--fm);font-size:0.65rem;color:var(--muted);letter-spacing:1px;}
.topbar-info strong{color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surf3);border:1px solid var(--border);border-radius:2px;}
.user-pill .av{width:26px;height:26px;background:rgba(0,212,255,0.1);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:0.9rem;font-weight:700;color:var(--cyan);}
.user-pill .un{font-family:var(--fm);font-size:0.65rem;color:var(--text);}
.user-pill .ur{font-family:var(--fm);font-size:0.55rem;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;}
.btn-sair{padding:7px 14px;background:transparent;border:1px solid rgba(255,59,59,0.3);border-radius:2px;color:rgba(255,59,59,0.7);font-family:var(--fm);font-size:0.65rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.btn-sair:hover{background:rgba(255,59,59,0.08);color:var(--danger);}

/* LAYOUT */
.page{position:relative;z-index:1;padding-top:64px;min-height:100vh;}

/* TABS */
.tab-bar{background:var(--surf);border-bottom:1px solid var(--border);display:flex;gap:0;padding:0 20px;position:sticky;top:64px;z-index:50;}
.tab{padding:12px 20px;font-family:var(--fm);font-size:0.68rem;letter-spacing:2px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab-badge{background:var(--danger);color:#fff;font-size:0.55rem;padding:1px 5px;border-radius:8px;}
.d-none{display:none;}

.content{padding:20px;}
.section{display:none;}
.section.active{display:block;}

/* KPI ROW */
.mec-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.mec-kpi{background:var(--surf);border:1px solid var(--border);border-radius:3px;padding:16px;position:relative;overflow:hidden;}
.mec-kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.mec-kpi.c1::after{background:var(--cyan);}
.mec-kpi.c2::after{background:var(--warn);}
.mec-kpi-label{font-family:var(--fm);font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.mec-kpi-val{font-family:var(--fd);font-size:1.8rem;font-weight:700;}
.mec-kpi.c1 .mec-kpi-val{color:var(--cyan);}
.mec-kpi.c2 .mec-kpi-val{color:var(--warn);}

/* KANBAN */
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;align-items:flex-start;}
.k-col{background:var(--surf2);border:1px solid var(--border);border-radius:3px;min-width:260px;width:260px;display:flex;flex-direction:column;max-height:calc(100vh - 200px);}
.k-col-head{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.k-col-label{font-family:var(--fd);font-size:0.82rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.k-col-count{font-family:var(--fm);font-size:0.62rem;color:var(--muted);padding:2px 7px;border:1px solid var(--border);border-radius:10px;}
.k-col-body{overflow-y:auto;padding:8px;flex:1;display:flex;flex-direction:column;gap:7px;}
.k-card{background:var(--surf3);border:1px solid var(--border);border-left:3px solid;border-radius:3px;padding:11px;cursor:pointer;transition:all 0.15s;}
.k-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.k-placa{font-family:var(--fm);font-size:0.9rem;font-weight:700;letter-spacing:2px;margin-bottom:3px;}
.k-cli{font-size:0.75rem;color:var(--muted2);margin-bottom:5px;}
.k-desc{font-size:0.7rem;color:var(--muted);margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* MODAL & FORM */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;backdrop-filter:blur(4px);overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--surf);border:1px solid var(--border2);border-radius:4px;width:100%;max-width:780px;position:relative;margin:auto;}
.modal-body{padding:20px;}
.j-input{background:var(--surf2);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:var(--ff);font-size:0.85rem;padding:9px 12px;outline:none;width:100%;}
.j-label{display:block;font-family:var(--fm);font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.btn-primary{padding:10px 16px;background:var(--cyan);color:#000;border:none;border-radius:2px;font-family:var(--fd);font-size:0.85rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}

/* CHAT */
.chat-box{background:var(--surf2);border:1px solid var(--border);border-radius:3px;height:55vh;display:flex;flex-direction:column;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
.chat-msg{max-width:75%;padding:9px 13px;border-radius:3px;font-size:0.82rem;line-height:1.5;word-break:break-word;}
.chat-msg.admin{background:rgba(0,212,255,0.1);align-self:flex-end;}
.chat-msg.cliente{background:var(--surf3);align-self:flex-start;}

/* VOICE-TO-TEXT BUTTON */
.btn-voice { background: var(--surf3); border: 1px solid var(--border); color: var(--cyan); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: 0.2s; }
.btn-voice.active { background: var(--danger); color: white; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 59, 59, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); } }

@media(max-width:600px){
  .mec-kpis{grid-template-columns:1fr;}
  .kanban-wrap{flex-direction:column;}
  .k-col{min-width:100%;width:100%;}
}
</style>
</head>
<body>
<div id="toastBox"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">J.A.R.V.I.S</div>
    <div class="topbar-info">EQUIPE · <strong id="tbTenantNome">...</strong></div>
  </div>
  <div class="topbar-right">
    <div class="user-pill">
      <div class="av" id="topAv">M</div>
      <div>
        <div class="un" id="topNome">...</div>
        <div class="ur">MECÂNICO</div>
      </div>
    </div>
    <button class="btn-sair" onclick="sair()">⏻ SAIR</button>
  </div>
</div>

<div class="page">
  <div class="tab-bar">
    <div class="tab active" onclick="irTab('t-kanban',this)">🔧 PÁTIO / O.S.</div>
    <div class="tab" onclick="irTab('t-chat',this)">💬 CHAT COM ADMIN <span class="tab-badge d-none" id="chatTabBadge">0</span></div>
    <div class="tab" onclick="irTab('t-ia',this)">🤖 thIAguinho</div>
  </div>

  <div class="content">
    <div class="section active" id="t-kanban">
      <div class="mec-kpis">
        <div class="mec-kpi c1"><div class="mec-kpi-label">MINHAS O.S. ABERTAS</div><div class="mec-kpi-val" id="kMeusOS">0</div></div>
        <div class="mec-kpi c2"><div class="mec-kpi-label">EM EXECUÇÃO AGORA</div><div class="mec-kpi-val" id="kEmExec">0</div></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;">
        <input class="j-input" id="searchOS" placeholder="Buscar placa..." oninput="renderKanban()" style="max-width:240px;">
        <button class="btn-primary" onclick="prepOS('add');abrirModal('modalOS')">+ NOVA O.S.</button>
      </div>
      <div class="kanban-wrap">
        <div class="k-col"><div class="k-col-head"><span class="k-col-label">TRIAGEM</span><span class="k-col-count" id="cnt-Triagem">0</span></div><div class="k-col-body" id="kb-Triagem"></div></div>
        <div class="k-col"><div class="k-col-head"><span class="k-col-label">ORÇAMENTO</span><span class="k-col-count" id="cnt-Orcamento">0</span></div><div class="k-col-body" id="kb-Orcamento"></div></div>
        <div class="k-col"><div class="k-col-head"><span class="k-col-label">EM SERVIÇO</span><span class="k-col-count" id="cnt-Andamento">0</span></div><div class="k-col-body" id="kb-Andamento"></div></div>
        <div class="k-col"><div class="k-col-head"><span class="k-col-label">PRONTO</span><span class="k-col-count" id="cnt-Pronto">0</span></div><div class="k-col-body" id="kb-Pronto"></div></div>
      </div>
    </div>

    <div class="section" id="t-chat">
      <div class="chat-box">
        <div class="chat-msgs" id="chatMsgs"></div>
        <div style="padding:10px; border-top:1px solid var(--border); display:flex; gap:8px;">
          <input class="j-input" id="chatInput" placeholder="Mensagem...">
          <button class="btn-primary" onclick="enviarMsg()">ENVIAR</button>
        </div>
      </div>
    </div>

    <div class="section" id="t-ia">
        <div style="background:var(--surf); border:1px solid var(--border); border-radius:8px; height:70vh; display:flex; flex-direction:column;">
            <div id="iaMsgs" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px;"></div>
            <div style="padding:15px; border-top:1px solid var(--border); display:flex; gap:10px;">
                <input class="j-input" id="iaInput" placeholder="Pergunte ao thIAguinho sobre falhas ou histórico...">
                <button class="btn-primary" onclick="iaEnviar()">ANALISAR</button>
            </div>
        </div>
    </div>
  </div>
</div>

<div class="overlay" id="modalOS">
<div class="modal">
  <div class="modal-body">
    <h3 style="margin-bottom:20px; color:var(--cyan); font-family:var(--fd);">FICHA TÉCNICA O.S.</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
      <div><label class="j-label">Cliente</label><select class="j-input" id="osCliente" onchange="filtrarVeics()"></select></div>
      <div><label class="j-label">Veículo</label><select class="j-input" id="osVeiculo"></select></div>
    </div>
    
    <div style="margin-bottom:15px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;">
            <label class="j-label">Relato do Problema</label>
            <button class="btn-voice" onclick="startVoice('osRelato', this)">🎤</button>
        </div>
        <textarea class="j-input" id="osRelato" rows="2" style="height:auto;"></textarea>
    </div>

    <div style="margin-bottom:15px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;">
            <label class="j-label">Diagnóstico Técnico</label>
            <button class="btn-voice" onclick="startVoice('osDiag', this)">🎤</button>
        </div>
        <textarea class="j-input" id="osDiag" rows="3" style="height:auto;"></textarea>
    </div>

    <div style="background:var(--surf3); padding:15px; border-radius:4px; margin-bottom:15px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span class="j-label" style="color:var(--success);">ORÇAMENTO TÉCNICO</span>
            <div style="display:flex; gap:5px;">
                <button class="btn-primary" style="padding:5px 10px; font-size:0.7rem;" onclick="adicionarPeca()">+ PEÇA</button>
                <button class="btn-primary" style="padding:5px 10px; font-size:0.7rem;" onclick="adicionarServico()">+ SERVIÇO</button>
            </div>
        </div>
        <div id="containerItens" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>

    <div style="display:flex; justify-content:flex-end; gap:10px;">
      <button class="btn-sair" onclick="fecharModal('modalOS')">CANCELAR</button>
      <button class="btn-primary" onclick="salvarOS()">SALVAR O.S.</button>
    </div>
  </div>
  <input type="hidden" id="osId">
</div>
</div>

<script>
const $ = id => document.getElementById(id);
const $v = id => $(id) ? $(id).value.trim() : '';

const J = {
  tid: sessionStorage.getItem('j_tid'),
  fid: sessionStorage.getItem('j_fid'),
  nome: sessionStorage.getItem('j_nome'),
  tnome: sessionStorage.getItem('j_tnome'),
  gemini: sessionStorage.getItem('j_gemini'),
  os: [], clientes: [], veiculos: [], estoque: []
};

if(!J.tid) window.location.href='index.html';

const db = firebase.firestore();

// LISTENERS
document.addEventListener('DOMContentLoaded', () => {
    db.collection('ordens_servico').where('tenantId','==',J.tid).onSnapshot(snap => {
        J.os = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderKanban(); renderKPIs();
    });
    db.collection('clientes').where('tenantId','==',J.tid).onSnapshot(snap => {
        J.clientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
        popularSelects();
    });
    db.collection('veiculos').where('tenantId','==',J.tid).onSnapshot(snap => {
        J.veiculos = snap.docs.map(d => ({id: d.id, ...d.data()}));
    });
    db.collection('estoqueItems').where('tenantId','==',J.tid).onSnapshot(snap => {
        J.estoque = snap.docs.map(d => ({id: d.id, ...d.data()}));
    });
});

function popularSelects() {
    if($('osCliente')) $('osCliente').innerHTML = '<option value="">Selecionar Cliente...</option>' + J.clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
}
function filtrarVeics() {
    const cid = $v('osCliente');
    const veics = J.veiculos.filter(v => v.clienteId === cid);
    if($('osVeiculo')) $('osVeiculo').innerHTML = '<option value="">Selecionar Veículo...</option>' + veics.map(v => `<option value="${v.id}">${v.modelo} (${v.placa})</option>`).join('');
}

function renderKPIs() {
    const minhas = J.os.filter(o => !o.mecId || o.mecId === J.fid);
    $('kMeusOS').innerText = minhas.filter(o => !['Pronto','Entregue','Cancelado'].includes(o.status)).length;
    $('kEmExec').innerText = minhas.filter(o => o.status === 'Andamento').length;
}

function renderKanban() {
    const statuses = ['Triagem', 'Orcamento', 'Andamento', 'Pronto'];
    const cols = { Triagem: [], Orcamento: [], Andamento: [], Pronto: [] };
    
    J.os.filter(o => o.status !== 'Cancelado' && o.status !== 'Entregue').forEach(o => {
        const v = J.veiculos.find(x => x.id === o.veiculoId) || {};
        const c = J.clientes.find(x => x.id === o.clienteId) || {};
        // CORREÇÃO SEM PLACA: Prioriza placa do veículo, senão usa a gravada na OS
        const placa = v.placa || o.placa || 'S/PLACA';
        if(cols[o.status]) cols[o.status].push({os:o, placa, cliente: c.nome || o.cliente});
    });

    statuses.forEach(s => {
        $(`cnt-${s}`).innerText = cols[s].length;
        $(`kb-${s}`).innerHTML = cols[s].map(item => `
            <div class="k-card" onclick="prepOS('edit','${item.os.id}');abrirModal('modalOS')">
                <div class="k-placa" style="color:var(--cyan)">${item.placa}</div>
                <div class="k-cli">${item.cliente || '—'}</div>
                <div class="k-desc">${item.os.relato || item.os.desc || 'Sem relato'}</div>
            </div>
        `).join('');
    });
}

function prepOS(mode, id=null) {
    $('osId').value = ''; $('osRelato').value = ''; $('osDiag').value = ''; $('containerItens').innerHTML = '';
    if(mode === 'edit' && id) {
        const os = J.os.find(x => x.id === id);
        $('osId').value = os.id;
        $('osCliente').value = os.clienteId || '';
        filtrarVeics();
        setTimeout(() => $('osVeiculo').value = os.veiculoId || '', 100);
        $('osRelato').value = os.relato || os.desc || '';
        $('osDiag').value = os.diagnostico || '';
        if(os.pecas) os.pecas.forEach(p => adicionarPeca(p));
        if(os.servicos) os.servicos.forEach(s => adicionarServico(s));
    }
}

function adicionarPeca(item = null) {
    const div = document.createElement('div');
    div.style.cssText = 'display:grid; grid-template-columns:1fr 60px 30px; gap:8px; align-items:center;';
    div.innerHTML = `
        <select class="j-input item-id"><option value="">Peça...</option>${J.estoque.map(p => `<option value="${p.id}" ${item && (item.estoqueId===p.id || item.id===p.id)?'selected':''}>${p.desc}</option>`).join('')}</select>
        <input type="number" class="j-input item-qtd" value="${item ? (item.q || item.qtd || 1) : 1}">
        <button onclick="this.parentElement.remove()" style="color:var(--danger); background:none; border:none; cursor:pointer;">✕</button>
    `;
    $('containerItens').appendChild(div);
}

function adicionarServico(item = null) {
    const div = document.createElement('div');
    div.style.cssText = 'display:grid; grid-template-columns:1fr 30px; gap:8px; align-items:center;';
    div.innerHTML = `
        <input type="text" class="j-input serv-desc" placeholder="Descreva o serviço..." value="${item ? item.desc : ''}">
        <button onclick="this.parentElement.remove()" style="color:var(--danger); background:none; border:none; cursor:pointer;">✕</button>
    `;
    $('containerItens').appendChild(div);
}

async function salvarOS() {
    const osId = $('osId').value;
    const pecas = [];
    const servicos = [];
    let totalOS = 0;

    document.querySelectorAll('#containerItens > div').forEach(row => {
        const pecaSel = row.querySelector('.item-id');
        if(pecaSel) {
            const pId = pecaSel.value;
            const pObj = J.estoque.find(x => x.id === pId);
            const qtd = parseFloat(row.querySelector('.item-qtd').value);
            if(pObj) {
                pecas.push({estoqueId: pId, desc: pObj.desc, q: qtd, v: pObj.venda});
                totalOS += (pObj.venda * qtd);
            }
        }
        const servInp = row.querySelector('.serv-desc');
        if(servInp) {
            servicos.push({desc: servInp.value, valor: 0}); // Mecânico não define preço
        }
    });

    const payload = {
        tenantId: J.tid,
        clienteId: $v('osCliente'),
        veiculoId: $v('osVeiculo'),
        relato: $v('osRelato'),
        diagnostico: $v('osDiag'),
        pecas, servicos,
        total: totalOS,
        status: osId ? J.os.find(x=>x.id===osId).status : 'Triagem',
        updatedAt: new Date().toISOString()
    };

    if(osId) await db.collection('ordens_servico').doc(osId).update(payload);
    else await db.collection('ordens_servico').add({...payload, createdAt: new Date().toISOString(), mecId: J.fid});
    
    fecharModal('modalOS');
    toast('O.S. Salva!', 'ok');
}

// VOICE-TO-TEXT LOGIC
function startVoice(targetId, btn) {
    if(!('webkitSpeechRecognition' in window)) return toast('Voz não suportada', 'err');
    const rec = new webkitSpeechRecognition();
    rec.lang = 'pt-BR';
    rec.onstart = () => btn.classList.add('active');
    rec.onend = () => btn.classList.remove('active');
    rec.onresult = e => $(targetId).value += ( $(targetId).value ? ' ' : '' ) + e.results[0][0].transcript;
    rec.start();
}

// IA thIAguinho (Auditor de Garantias)
let _iaHist = [];
async function iaEnviar() {
    const inp = $('iaInput'); const msg = inp.value.trim(); if(!msg) return;
    inp.value = '';
    adicionarMsgIA('user', msg);
    const lid = adicionarMsgIA('bot', '<span class="spinner"></span> Consultando histórico...');

    let ctxOS = "HISTÓRICO DA OFICINA (ÚLTIMOS 24 MESES):\n";
    J.os.forEach(o => {
        ctxOS += `Placa: ${o.placa || '?'}, Data: ${o.data || '?'}, Peças: ${(o.pecas||[]).map(p=>p.desc).join(',')}\n`;
    });

    const systemPrompt = `Você é thIAguinho, assistente técnico nível Bosch Pro. Use o histórico abaixo para AUDITAR GARANTIAS.
    Amortecedores: 2 anos. Kits: 3 meses. Baterias: 1 ano.
    Se o mecânico citar uma placa e peça que já foi trocada no prazo, ALERTE EM NEGRITO.
    ${ctxOS}`;

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${J.gemini}`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ contents: [{role:'user', parts:[{text:msg}]}], systemInstruction: {parts:[{text:systemPrompt}]} })
        });
        const data = await res.json();
        const resp = data.candidates[0].content.parts[0].text;
        $(lid).innerHTML = `<strong>thIAguinho:</strong> ${resp.replace(/\n/g,'<br>')}`;
    } catch(e) { $(lid).innerText = 'Erro na IA.'; }
}

function adicionarMsgIA(role, txt) {
    const id = 'ia-' + Date.now();
    const div = document.createElement('div'); div.id = id;
    div.className = 'chat-msg ' + (role==='bot' ? 'cliente' : 'admin');
    div.innerHTML = role==='bot' ? `<strong>thIAguinho:</strong> ${txt}` : txt;
    $('iaMsgs').appendChild(div);
    $('iaMsgs').scrollTop = $('iaMsgs').scrollHeight;
    return id;
}

function abrirModal(id){$(id).style.display='flex'; $(id).classList.add('open');}
function fecharModal(id){$(id).style.display='none'; $(id).classList.remove('open');}
function irTab(id,el){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    $(id).classList.add('active'); el.classList.add('active');
}
function toast(m,t){ const e=document.createElement('div'); e.className=`toast-j ${t}`; e.innerText=m; $('toastBox').appendChild(e); setTimeout(()=>e.remove(),3000); }
function sair(){ sessionStorage.clear(); window.location.href='index.html'; }
function moeda(v){ return 'R$ ' + parseFloat(v||0).toFixed(2).replace('.',','); }
function dtBr(i){ return i ? new Date(i).toLocaleDateString('pt-BR') : '-'; }
</script>
