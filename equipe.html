<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S — Painel da Equipe</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060A14;--surf:#0C1426;--surf2:#111D35;--surf3:#162040;
  --cyan:#00D4FF;--danger:#FF3B3B;--warn:#FFB800;--success:#00FF88;
  --text:#E8F4FF;--muted:#4A6B8A;--muted2:#7A9AB8;
  --border:rgba(0,212,255,0.1);--border2:rgba(0,212,255,0.2);
  --ff:'Exo 2',sans-serif;--fm:'JetBrains Mono',monospace;--fd:'Rajdhani',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--ff);color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surf);}
::-webkit-scrollbar-thumb{background:var(--surf3);}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--fd);font-size:1.2rem;font-weight:700;letter-spacing:4px;color:var(--cyan);}
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surf3);border:1px solid var(--border);border-radius:2px;}
.user-pill .av{width:26px;height:26px;background:rgba(0,212,255,0.1);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:0.9rem;font-weight:700;color:var(--cyan);}

.tab-bar{background:var(--surf);border-bottom:1px solid var(--border);display:flex;padding:0 20px;position:fixed;top:54px;left:0;right:0;z-index:90;}
.tab{padding:12px 20px;font-family:var(--fm);font-size:0.68rem;letter-spacing:2px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

.content{padding:20px; padding-top:110px;}
.section{display:none;}
.section.active{display:block;}

.mec-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.mec-kpi{background:var(--surf);border:1px solid var(--border);border-radius:3px;padding:16px;}
.mec-kpi-label{font-family:var(--fm);font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.mec-kpi-val{font-family:var(--fd);font-size:1.8rem;font-weight:700;color:var(--cyan);}

.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;align-items:flex-start;}
.k-col{background:var(--surf2);border:1px solid var(--border);border-radius:3px;min-width:280px;display:flex;flex-direction:column;max-height:70vh;}
.k-col-head{padding:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-family:var(--fd);font-weight:700;font-size:0.85rem;}
.k-col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;}
.k-card{background:var(--surf3);border:1px solid var(--border);border-left:3px solid var(--cyan);padding:12px;border-radius:3px;cursor:pointer;}
.k-placa{font-family:var(--fm);font-weight:700;font-size:0.95rem;color:var(--cyan);margin-bottom:4px;}
.k-cli{font-size:0.75rem;color:var(--muted2);margin-bottom:6px;}
.k-desc{font-size:0.7rem;color:var(--muted);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.overlay.open{display:flex;}
.modal{background:var(--surf);border:1px solid var(--border2);border-radius:4px;width:100%;max-width:700px;padding:25px;}
.j-input{background:var(--surf2);border:1px solid var(--border);border-radius:2px;color:#fff;padding:10px;width:100%;margin-bottom:15px;font-family:var(--ff);outline:none;}
.j-label{font-family:var(--fm);font-size:0.6rem;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:5px;}
.btn-primary{background:var(--cyan);color:#000;border:none;padding:12px 20px;font-weight:700;font-family:var(--fd);cursor:pointer;border-radius:2px;}
.btn-voice { background: var(--surf3); border: 1px solid var(--border); color: var(--cyan); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display:flex; align-items:center; justify-content:center; }
.btn-voice.active { background: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger); }

.chat-box{background:var(--surf2);border:1px solid var(--border);height:60vh;display:flex;flex-direction:column;}
.chat-msgs{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;}
.chat-msg{padding:10px 15px;border-radius:3px;max-width:80%;font-size:0.85rem;}
.chat-msg.admin{background:rgba(0,212,255,0.1);align-self:flex-end;}
.chat-msg.cliente{background:var(--surf3);align-self:flex-start;}

.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--cyan); border-right-color: transparent; border-radius: 50%; animation: rot 0.8s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">J.A.R.V.I.S</div>
  <div class="user-pill"><div class="av">M</div><div class="un" id="topNome">Mecânico</div></div>
</div>

<div class="page">
  <div class="tab-bar">
    <div class="tab active" onclick="irTab('t-kanban',this)">🔧 PÁTIO</div>
    <div class="tab" onclick="irTab('t-chat',this)">💬 CHAT</div>
    <div class="tab" onclick="irTab('t-ia',this)">🤖 thIAguinho</div>
  </div>

  <div class="content">
    <div class="section active" id="t-kanban">
      <div class="mec-kpis">
        <div class="mec-kpi"><div class="mec-kpi-label">MINHAS O.S.</div><div class="mec-kpi-val" id="kMeusOS">0</div></div>
        <div class="mec-kpi"><div class="mec-kpi-label">TOTAL NO PÁTIO</div><div class="mec-kpi-val" id="kTotalPátio">0</div></div>
      </div>
      <div class="kanban-wrap">
        <div class="k-col"><div class="k-col-head"><span>AGUARDANDO</span><span id="cnt-Aguardando">0</span></div><div class="k-col-body" id="kb-Aguardando"></div></div>
        <div class="k-col"><div class="k-col-head"><span>ORÇAMENTO</span><span id="cnt-orcamento">0</span></div><div class="k-col-body" id="kb-orcamento"></div></div>
        <div class="k-col"><div class="k-col-head"><span>EM SERVIÇO (BOX)</span><span id="cnt-box">0</span></div><div class="k-col-body" id="kb-box"></div></div>
        <div class="k-col"><div class="k-col-head"><span>PRONTO</span><span id="cnt-pronto">0</span></div><div class="k-col-body" id="kb-pronto"></div></div>
      </div>
    </div>

    <div class="section" id="t-chat">
      <div class="chat-box"><div class="chat-msgs" id="chatMsgs"></div><div style="padding:10px; display:flex; gap:10px;"><input class="j-input" id="chatInput" style="margin:0"><button class="btn-primary" onclick="enviarMsg()">ENVIAR</button></div></div>
    </div>

    <div class="section" id="t-ia">
        <div class="chat-box"><div class="chat-msgs" id="iaMsgs"></div><div style="padding:10px; display:flex; gap:10px;"><input class="j-input" id="iaInput" style="margin:0" placeholder="Pergunte ao thIAguinho sobre falhas ou garantias..."><button class="btn-primary" onclick="iaEnviar()">ANALISAR</button></div></div>
    </div>
  </div>
</div>

<div class="overlay" id="modalOS">
  <div class="modal">
    <h3 style="color:var(--cyan); margin-bottom:20px; font-family:var(--fd)">FICHA TÉCNICA O.S.</h3>
    <label class="j-label">Relato do Cliente</label>
    <div style="display:flex; gap:10px; margin-bottom:15px;"><textarea class="j-input" id="osRelato" rows="2" style="margin:0"></textarea><button class="btn-voice" onclick="startVoice('osRelato', this)">🎤</button></div>
    <label class="j-label">Diagnóstico Técnico</label>
    <div style="display:flex; gap:10px; margin-bottom:15px;"><textarea class="j-input" id="osDiag" rows="3" style="margin:0"></textarea><button class="btn-voice" onclick="startVoice('osDiag', this)">🎤</button></div>
    
    <div style="background:var(--surf3); padding:15px; margin-bottom:20px;">
        <span class="j-label" style="color:var(--success)">Peças e Serviços</span>
        <div id="containerItens" style="margin:10px 0; display:flex; flex-direction:column; gap:8px;"></div>
        <div style="display:flex; gap:10px;"><button class="btn-primary" style="padding:5px 10px; font-size:0.7rem" onclick="adicionarPeca()">+ PEÇA</button><button class="btn-primary" style="padding:5px 10px; font-size:0.65rem" onclick="adicionarServico()">+ SERVIÇO</button></div>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:10px;"><button class="btn-sair" style="background:none; border:none; cursor:pointer; color:var(--muted)" onclick="fecharModal()">CANCELAR</button><button class="btn-primary" onclick="salvarOS()">SALVAR O.S.</button></div>
    <input type="hidden" id="osId">
  </div>
</div>

<script src="js/config.js"></script>
<script>
const $ = id => document.getElementById(id);
const $v = id => $(id) ? $(id).value.trim() : '';
const J = { tid: sessionStorage.getItem('j_tid'), fid: sessionStorage.getItem('j_fid'), nome: sessionStorage.getItem('j_nome'), gemini: sessionStorage.getItem('j_gemini'), os: [], veiculos: [], estoque: [] };
const db = firebase.firestore();

document.addEventListener('DOMContentLoaded', () => {
    if(!J.tid) { window.location.href='index.html'; return; }
    $('topNome').innerText = J.nome;
    db.collection('ordens_servico').where('tenantId','==',J.tid).onSnapshot(snap => { J.os = snap.docs.map(d => ({id: d.id, ...d.data()})); renderKanban(); });
    db.collection('veiculos').where('tenantId','==',J.tid).onSnapshot(snap => { J.veiculos = snap.docs.map(d => ({id: d.id, ...d.data()})); });
    db.collection('estoqueItems').where('tenantId','==',J.tid).onSnapshot(snap => { J.estoque = snap.docs.map(d => ({id: d.id, ...d.data()})); });
});

function renderKanban() {
    // NOMES REAIS DO SEU BANCO DE DADOS
    const statuses = ['Aguardando', 'orcamento', 'box', 'pronto'];
    const cols = { Aguardando: [], orcamento: [], box: [], pronto: [] };
    
    J.os.filter(o => o.status !== 'Cancelado' && o.status !== 'Entregue').forEach(o => {
        const v = J.veiculos.find(x => x.id === o.veiculoId) || {};
        const placa = o.placa || v.placa || 'S/PLACA';
        let st = o.status;
        // Normalização para garantir que apareça na coluna certa
        if(st === 'patio' || st === 'Triagem') st = 'Aguardando';
        if(st === 'Andamento' || st === 'execucao') st = 'box';
        if(cols[st]) cols[st].push({os:o, placa});
    });

    statuses.forEach(s => {
        $(`cnt-${s}`).innerText = cols[s].length;
        $(`kb-${s}`).innerHTML = cols[s].map(i => `
            <div class="k-card" onclick="abrirOS('${i.os.id}')">
                <div class="k-placa">${i.placa}</div>
                <div class="k-cli">${i.os.cliente || 'Cliente'}</div>
                <div class="k-desc">${i.os.relato || i.os.desc || '—'}</div>
            </div>
        `).join('');
    });
    $('kMeusOS').innerText = J.os.filter(o => o.mecId === J.fid && o.status !== 'Entregue').length;
    $('kTotalPátio').innerText = J.os.filter(o => !['Entregue','Cancelado'].includes(o.status)).length;
}

function abrirOS(id) {
    const os = J.os.find(x => x.id === id); if(!os) return;
    $('osId').value = os.id; $('osRelato').value = os.relato || os.desc || ''; $('osDiag').value = os.diagnostico || '';
    $('containerItens').innerHTML = '';
    if(os.pecas) os.pecas.forEach(p => adicionarPeca(p));
    if(os.servicos) os.servicos.forEach(s => adicionarServico(s));
    $('modalOS').classList.add('open');
}

function adicionarPeca(item = null) {
    const div = document.createElement('div');
    div.style.cssText = 'display:grid; grid-template-columns:1fr 60px 30px; gap:8px; align-items:center;';
    div.innerHTML = `<select class="j-input item-id" style="margin:0"><option value="">Peça...</option>${J.estoque.map(p => `<option value="${p.id}" ${item && (item.estoqueId===p.id || item.id===p.id)?'selected':''}>${p.desc}</option>`).join('')}</select>
    <input type="number" class="j-input item-qtd" value="${item ? (item.q || item.qtd || 1) : 1}" style="margin:0">
    <button onclick="this.parentElement.remove()" style="color:var(--danger); background:none; border:none; cursor:pointer;">✕</button>`;
    $('containerItens').appendChild(div);
}

function adicionarServico(item = null) {
    const div = document.createElement('div');
    div.style.cssText = 'display:grid; grid-template-columns:1fr 30px; gap:8px; align-items:center;';
    div.innerHTML = `<input type="text" class="j-input serv-desc" placeholder="Serviço..." value="${item ? item.desc : ''}" style="margin:0">
    <button onclick="this.parentElement.remove()" style="color:var(--danger); background:none; border:none; cursor:pointer;">✕</button>`;
    $('containerItens').appendChild(div);
}

async function salvarOS() {
    const id = $v('osId'); const pecas = []; const servicos = [];
    document.querySelectorAll('#containerItens > div').forEach(row => {
        const pId = row.querySelector('.item-id')?.value;
        const sDesc = row.querySelector('.serv-desc')?.value;
        if(pId) { const p = J.estoque.find(x => x.id === pId); pecas.push({ estoqueId: pId, desc: p.desc, q: parseFloat(row.querySelector('.item-qtd').value), v: p.venda }); }
        else if(sDesc) { servicos.push({ desc: sDesc, valor: 0 }); }
    });
    await db.collection('ordens_servico').doc(id).update({ relato: $v('osRelato'), diagnostico: $v('osDiag'), pecas, servicos, updatedAt: new Date().toISOString() });
    fecharModal();
}

function startVoice(tid, btn) {
    if(!('webkitSpeechRecognition' in window)) return;
    const rec = new webkitSpeechRecognition(); rec.lang = 'pt-BR';
    rec.onstart = () => btn.classList.add('active'); rec.onend = () => btn.classList.remove('active');
    rec.onresult = e => { $(tid).value += ($(tid).value ? ' ' : '') + e.results[0][0].transcript; };
    rec.start();
}

// PROMPT COMPLETO DO THIAGUINHO (AUDITORIA E APOIO)
async function iaEnviar() {
    const inp = $('iaInput'); const msg = inp.value.trim(); if(!msg) return;
    inp.value = ''; adicionarMsgIA('user', msg);
    const lid = adicionarMsgIA('bot', '<span class="spinner"></span> Consultando Manuais e Histórico...');
    
    let ctx = "HISTÓRICO DA OFICINA (24 MESES):\n" + J.os.map(o => `Placa: ${o.placa}, Data: ${o.createdAt}, Peças: ${(o.pecas||[]).map(p=>p.desc).join(', ')}`).join('\n');
    const system = `Você é thIAguinho, assistente técnico JARVIS nível Master Bosch/Doutor-IE.
    Sua missão é:
    1. AUDITORIA DE GARANTIA: Se o mecânico citar peça já trocada no prazo (Amortecedor: 2 anos, Bateria: 1 ano), ALERTE EM NEGRITO.
    2. APOIO TÉCNICO: Dê torques de aperto e dicas de diagnóstico.
    3. RETORNO: Identifique se o carro voltou com o mesmo problema em < 30 dias.
    CONTEXTO: ${ctx}`;

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${J.gemini}`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ contents: [{role:'user', parts:[{text:msg}]}], systemInstruction: {parts:[{text:system}]} })
        });
        const data = await res.json();
        $(lid).innerHTML = `<strong>thIAguinho:</strong> ${data.candidates[0].content.parts[0].text.replace(/\n/g,'<br>')}`;
    } catch(e) { $(lid).innerText = 'Erro na IA.'; }
}

function adicionarMsgIA(role, txt) {
    const id = 'ia-' + Date.now(); const div = document.createElement('div'); div.id = id;
    div.className = 'chat-msg ' + (role==='bot' ? 'cliente' : 'admin');
    div.innerHTML = role==='bot' ? `<strong>thIAguinho:</strong> ${txt}` : txt;
    $('iaMsgs').appendChild(div); $('iaMsgs').scrollTop = $('iaMsgs').scrollHeight; return id;
}

function irTab(id, el) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); $(id).classList.add('active'); el.classList.add('active'); }
function fecharModal(){ $('modalOS').classList.remove('open'); }
function sair(){ sessionStorage.clear(); window.location.href='index.html'; }
</script>
</body>
</html>
